name: Publish API Client

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  publish-api-client:
    runs-on: ubuntu-latest
    environment: env

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@jobio-org'

      - name: Create .env file
        run: |
          cat <<EOF > config/.env
          DB_URL=${{ secrets.DB_URL }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY=${{ secrets.SUPABASE_SECRET_KEY }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          REDIS_URL=${{ secrets.REDIS_URL }}
          SNAPLET_SOURCE_DATABASE_URL=${{ secrets.SNAPLET_SOURCE_DATABASE_URL }}
          SNAPLET_TARGET_DATABASE_URL=${{ secrets.SNAPLET_TARGET_DATABASE_URL }}
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Determine version bump type
        id: vars
        run: |
          if [[ "${GITHUB_REF##*/}" == "main" ]]; then
            echo "version_bump=major" >> $GITHUB_OUTPUT
          else
            echo "version_bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Get latest published version
        id: get_version
        run: |
          latest_version=$(npm view @jobio-org/api-client version || echo "0.0.0")
          echo "latest_version=$latest_version" >> $GITHUB_OUTPUT

      - name: Bump version manually
        run: |
          cd packages/api-client
          node -e "
          const fs = require('fs');
          const semver = require('semver');
          const pkgPath = './package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath));
          const latestVersion = process.env.LATEST_VERSION || '0.0.0';
          const bumpType = process.env.BUMP_TYPE || 'patch';
          const newVersion = semver.inc(latestVersion, bumpType);
          pkg.version = newVersion;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
          console.log('Bumped version from', latestVersion, 'to', newVersion);
          "
        env:
          LATEST_VERSION: ${{ steps.get_version.outputs.latest_version }}
          BUMP_TYPE: ${{ steps.vars.outputs.version_bump }}

      - name: Generate API client
        run: |
          npm run api-client:generate

      - name: Publish to GitHub Packages
        run: |
          cd packages/api-client
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
